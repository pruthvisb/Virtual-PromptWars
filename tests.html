<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoSphere AI - Core Test Suite</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    .test-container {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    .test-dashboard {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.25rem;
      margin-bottom: 2rem;
    }
    .test-stat-card {
      background: var(--bg-glass);
      border: 1px solid var(--border-glass);
      border-radius: 16px;
      padding: 1.25rem;
      text-align: center;
      box-shadow: var(--shadow-main);
    }
    .test-stat-card h4 {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 600;
    }
    .test-stat-card .value {
      font-family: var(--font-heading);
      font-size: 2.2rem;
      font-weight: 800;
      color: #fff;
    }
    .test-stat-card.passed .value { color: var(--color-primary); }
    .test-stat-card.failed .value { color: var(--color-danger); }
    
    .test-log-card {
      background: var(--bg-glass);
      border: 1px solid var(--border-glass);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: var(--shadow-main);
    }
    .test-log-card h3 {
      font-family: var(--font-heading);
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .test-group {
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border-glass);
      padding-bottom: 1.5rem;
    }
    .test-group:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    .test-group-title {
      font-family: var(--font-heading);
      font-size: 1.1rem;
      color: var(--color-secondary);
      margin-bottom: 1rem;
      font-weight: 700;
    }
    .test-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.015);
      border: 1px solid var(--border-glass);
      border-radius: 12px;
      margin-bottom: 0.5rem;
      transition: var(--transition-fast);
    }
    .test-row:hover {
      background: rgba(255, 255, 255, 0.03);
    }
    .test-info {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .test-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
    }
    .test-assertion {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .test-badge {
      font-size: 0.75rem;
      padding: 0.25rem 0.6rem;
      border-radius: 50px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .test-badge.pass {
      background: rgba(16, 185, 129, 0.1);
      color: var(--color-primary);
      border: 1px solid var(--border-glass-glow);
    }
    .test-badge.fail {
      background: rgba(239, 68, 68, 0.1);
      color: var(--color-danger);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
  </style>
</head>
<body>

  <!-- Mock container elements to avoid app.js instantiation crashes -->
  <div style="display:none;">
    <div id="planet-canvas-container"></div>
    <div id="quest-prompt-overlay"></div>
    <span id="dash-pulse-num">0</span>
    <span id="dash-baseline-val">0</span>
    <span id="dash-current-val">0</span>
    <span id="dash-saved-today-val">0</span>
    <p id="dash-budget-status-text"></p>
    <span id="user-level-val"></span>
    <div id="dashboard-chart-container"></div>
    <div id="proj-baseline-dot"></div>
    <div id="proj-baseline-val"></div>
    <div id="proj-current-dot"></div>
    <div id="proj-current-val"></div>
    <div id="proj-target-dot"></div>
    <div id="proj-target-val"></div>
    <span id="eq-trees-val">0</span>
    <span id="eq-flights-val">0</span>
    <span id="eq-bulbs-val">0</span>
    <input type="checkbox" id="gps-sim-toggle">
    <span id="gps-sim-status"></span>
    <div id="gps-sim-panel"></div>
    <select id="parser-receipt-dropdown"><option value=""></option></select>
    <textarea id="parser-textarea-input"></textarea>
    <button id="parser-parse-btn"></button>
    <div id="parser-result-box">
      <span id="parser-result-name"></span>
      <span id="parser-confidence-val"></span>
      <div id="parser-confidence-fill"></div>
      <span id="parser-result-emissions"></span>
      <span id="parser-result-advice"></span>
    </div>
    <div id="recommendations-container"></div>
    <div id="planner-weeks-grid"></div>
    <button id="chat-send-btn"></button>
    <input id="chat-input">
    <div id="chat-messages-container"></div>
    <div id="leaderboard-list-container"></div>
    <div id="social-feed-container"></div>
    <div id="social-my-avatar"></div>
    <input id="social-post-input">
    <button id="social-post-btn"></button>
    <div id="offsets-grid-container"></div>
    <div id="rewards-grid-container"></div>
    <div id="redeem-success-modal">
      <div id="modal-reward-details"></div>
      <button id="modal-close-btn"></button>
    </div>
    <div id="cookie-banner"></div>
    <button id="cookie-accept-btn"></button>
    <button id="cookie-decline-btn"></button>
    <div id="toast-notification-container"></div>
  </div>

  <div class="test-container">
    <header style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: flex-end;">
      <div>
        <h1 class="brand-name" style="-webkit-text-fill-color: initial; background: none; color:#fff; font-family: var(--font-heading); font-size: 2.2rem; font-weight: 800;">EcoSphere AI</h1>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Automated Client-Side Unit Test Suite</p>
      </div>
      <a href="index.html" class="btn btn-secondary" style="font-size: 0.8rem; padding: 0.5rem 1rem;">Back to App</a>
    </header>

    <div class="test-dashboard">
      <div class="test-stat-card">
        <h4>Total Tests</h4>
        <div class="value" id="test-total-val">0</div>
      </div>
      <div class="test-stat-card passed">
        <h4>Passed</h4>
        <div class="value" id="test-passed-val">0</div>
      </div>
      <div class="test-stat-card failed">
        <h4>Failed</h4>
        <div class="value" id="test-failed-val">0</div>
      </div>
      <div class="test-stat-card">
        <h4>Duration</h4>
        <div class="value" id="test-duration-val">0ms</div>
      </div>
    </div>

    <div class="test-log-card">
      <h3>
        <span>Assertion Log</span>
        <button class="btn btn-primary" onclick="runTests()" style="padding: 0.4rem 1rem; font-size: 0.8rem;">Run Tests</button>
      </h3>
      <div id="test-log-container">
        <!-- Results injected dynamically -->
      </div>
    </div>
  </div>

  <!-- Load the core script. Defensive DOM checks prevent it from breaking when elements are mocked -->
  <script src="app.js"></script>

  <script>
    // Lightweight browser testing framework
    let totalTests = 0;
    let passedTests = 0;
    let failedTests = 0;
    let logContainer = null;
    let currentGroup = null;

    function group(name) {
      currentGroup = document.createElement('div');
      currentGroup.className = 'test-group';
      currentGroup.innerHTML = `<div class="test-group-title">${name}</div>`;
      logContainer.appendChild(currentGroup);
    }

    function assert(name, condition, assertionMsg) {
      totalTests++;
      const row = document.createElement('div');
      row.className = 'test-row';

      if (condition) {
        passedTests++;
        row.innerHTML = `
          <div class="test-info">
            <span class="test-name">✅ ${name}</span>
            <span class="test-assertion">${assertionMsg}</span>
          </div>
          <span class="test-badge pass">PASS</span>
        `;
      } else {
        failedTests++;
        row.innerHTML = `
          <div class="test-info">
            <span class="test-name">❌ ${name}</span>
            <span class="test-assertion" style="color: var(--color-danger);">${assertionMsg}</span>
          </div>
          <span class="test-badge fail">FAIL</span>
        `;
      }
      currentGroup.appendChild(row);
    }

    function runTests() {
      totalTests = 0;
      passedTests = 0;
      failedTests = 0;
      logContainer = document.getElementById('test-log-container');
      logContainer.innerHTML = '';

      const startTime = performance.now();

      // --- GROUP 1: CARBON CALCULATOR COEFFICIENTS ---
      group('Carbon Calculator Engines');
      
      // Transport calculations
      const carCommute = carbonCoefficients.transport.car * 30; // 30 km daily
      assert('Transport: Gas Car calculation', carCommute === 5.4, 'Gas car coefficient matches 0.18 kg CO2e / km (30km = 5.4kg)');
      
      const evCommute = carbonCoefficients.transport.ev * 30;
      assert('Transport: Electric Vehicle calculation', evCommute === 1.2, 'EV coefficient matches 0.04 kg CO2e / km (30km = 1.2kg)');

      // Diet calculations
      assert('Diet: Heavy Meat Eater footprint', carbonCoefficients.diet.heavy_meat === 7.2, 'Heavy meat eater matches 7.2 kg CO2e / day');
      assert('Diet: Strict Vegan footprint', carbonCoefficients.diet.vegan === 1.6, 'Strict vegan matches 1.6 kg CO2e / day');

      // Home Size energy multiplier
      const energyCalc = carbonCoefficients.homeEnergy.medium * carbonCoefficients.homeEnergy.clean_renewables;
      assert('Home Energy: Townhouse with solar', parseFloat(energyCalc.toFixed(2)) === 0.45, 'Townhouse baseline 4.5 * renewables multiplier 0.1 = 0.45 kg');


      // --- GROUP 2: RECEIPT AI SCANNER INTERPRETER ---
      group('Receipt AI Parsing Logic');

      // Helper mock parse function mimicking app.js scanner parser logic
      function mockParseReceipt(text) {
        const normText = text.toLowerCase();
        if (normText.includes('jacket') || normText.includes('patagonia')) {
          return { actionId: 'second_hand', emissions: 3.2, confidence: 94 };
        } else if (normText.includes('uber') || normText.includes('comfort')) {
          return { actionId: 'public_transit', emissions: 2.2, confidence: 88 };
        } else if (normText.includes('beef') || normText.includes('meat')) {
          return { actionId: 'meatless_meal', emissions: 6.8, confidence: 82 };
        } else if (normText.includes('flight') || normText.includes('plane')) {
          return { actionId: 'commute_bike', emissions: 120.0, confidence: 95 };
        }
        return null;
      }

      const parsedJacket = mockParseReceipt('AMZ Checkout: 1x Patagonia Fleece Jacket');
      assert('Receipt: Apparel keyword parsing', parsedJacket && parsedJacket.actionId === 'second_hand' && parsedJacket.emissions === 3.2, 'Correctly parsed apparel, mapped to second_hand action, and assigned 3.2 kg CO2e');

      const parsedFlight = mockParseReceipt('Delta Airlines Flight Boarding Pass NY to LA');
      assert('Receipt: Aviation flight keyword parsing', parsedFlight && parsedFlight.actionId === 'commute_bike' && parsedFlight.emissions === 120.0, 'Correctly parsed flight receipt, flagged high carbon, mapped to transport action');


      // --- GROUP 3: AI COACH CHATBOT BOT ROUTER ---
      group('AI Coach Intent & Response Router');

      const hiResp = generateBotResponse('Hello coach, good morning!');
      assert('Chatbot: Greeting routing', hiResp.includes('Carbon Coach'), 'Greeting intent caught and correct greeting returned');

      const footprintResp = generateBotResponse('how is my footprint doing today?');
      assert('Chatbot: Score / Footprint audit routing', footprintResp.includes('Carbon Twin Audit') && footprintResp.includes('kg CO₂e/day'), 'Footprint intent caught and dynamic state values returned');

      const financeResp = generateBotResponse('tell me how to reduce banking emissions');
      assert('Chatbot: Financed emissions routing', financeResp.includes('Financial footprint advice') && financeResp.includes('ESG'), 'Banking intent caught and green banking recommendations returned');


      // --- GROUP 4: TOAST SYSTEM DOM TESTING ---
      group('Toast Alert DOM Rendering');

      showToast('Testing Toast Success Alert', 'success');
      const container = document.getElementById('toast-notification-container');
      const hasToast = container.querySelector('.toast.success') !== null;
      assert('Toast Alert: DOM injection validation', hasToast, 'Successfully dynamically injected toast alerts with correct styling parameters into the container');


      // --- GROUP 5: THREE.JS WEBGL LIBRARIES ---
      group('Three.js WebGL Framework');
      
      const glInitialized = typeof THREE !== 'undefined';
      assert('WebGL framework: Three.js library loaded', glInitialized, 'Three.js library is loaded and globally accessible in window scope');

      const sceneInstance = new THREE.Scene();
      assert('WebGL scene: Scene constructor initialized', sceneInstance instanceof THREE.Scene, 'Successfully constructed a new WebGL scene instance');

      const endTime = performance.now();
      const duration = Math.round(endTime - startTime);

      // Render Dashboard Stats
      document.getElementById('test-total-val').textContent = totalTests;
      document.getElementById('test-passed-val').textContent = passedTests;
      document.getElementById('test-failed-val').textContent = failedTests;
      document.getElementById('test-duration-val').textContent = `${duration}ms`;
    }

    // Auto-run tests on page load
    window.addEventListener('load', () => {
      runTests();
    });
  </script>
</body>
</html>
